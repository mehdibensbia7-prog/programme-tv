<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Programme TV & Actus</title>
    <style>
        :root { --bg: #101418; --panel: #171d24; --text: #e8ecef; --tube: #ff5f3c; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            padding: 10px; 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden; /* Empêche le débordement horizontal */
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 15px; 
        }
        h1 { color: var(--tube); font-size: 24px; margin-top: 0; }
        .card { 
            background: #1c232b; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            display: flex; 
            gap: 10px; 
        }
        .card img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .card-body { overflow: hidden; }
        .card-title { font-weight: bold; color: #fff; margin: 0 0 5px 0; display: block; text-decoration: none; }
        .meta { font-size: 12px; color: #97a0aa; }
    </style>
</head>
<body>

<div class="container">
    <h1>Programme TV</h1>
    
    <div id="content">
        <p>Chargement des données...</p>
    </div>
</div>

<script>
    async function loadData() {
        const container = document.getElementById('content');
        try {
            // Remplacez 'videos.json' par le chemin de votre fichier de données
            const res = await fetch('./data/videos.json', { cache: "no-store" });
            const data = await res.json();
            
            if (!data.items || data.items.length === 0) {
                container.innerHTML = "<p>Aucune donnée disponible.</p>";
                return;
            }

            container.innerHTML = data.items.map(item => `
                <div class="card">
                    ${item.image ? `<img src="${item.image}" alt="">` : ''}
                    <div class="card-body">
                        <a class="card-title" href="${item.link}" target="_blank">${item.title}</a>
                        <div class="meta">Saison : ${item.season || 'N/A'} | Date : ${item.date || 'N/A'}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<p>Erreur de chargement des données.</p>";
        }
    }

    loadData();
</script>
</body>
</html>
