<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme TV — Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --screen: #101418;
            --panel: #171d24;
            --panel-edge: #232b34;
            --scan: #1c232b;
            --tube: #ff5f3c;
            --text: #e8ecef;
            --muted: #97a0aa;
            --ok: #4fd1a5;
            --err: #ff6b6b;
        }

        body {
            margin: 0;
            padding: 32px 16px;
            background: var(--screen);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .tv {
            width: 100%;
            max-width: 760px;
            background: #141a1f;
            border-radius: 28px;
            padding: 28px 24px;
        }

        h1 { font-size: 26px; margin: 0 0 8px; }
        h1 span { color: var(--tube); }

        .section {
            margin-top: 32px;
            border-top: 1px solid var(--panel-edge);
            padding-top: 22px;
        }

        h2 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .radio-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4px;
            border-bottom: 1px solid var(--panel-edge);
        }
        .radio-row:last-child { border-bottom: none; }
        .radio-row span { font-size: 15px; }

        .card {
            background: var(--scan);
            padding: 16px 18px;
            border-radius: 12px;
            margin-bottom: 14px;
            border: 1px solid var(--panel-edge);
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }
        .card img { border-radius: 8px; flex-shrink: 0; }
        .card a {
            color: var(--tube);
            font-weight: 700;
            text-decoration: none;
            font-size: 15px;
        }
        .card p {
            font-size: 14px;
            line-height: 1.5;
            margin: 8px 0 0;
            color: var(--muted);
        }

        .radio-btn {
            background: rgba(255, 95, 60, .1);
            border: 1px solid rgba(255, 95, 60, .35);
            color: var(--tube);
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            font-size: 13px;
        }
        .radio-btn.playing {
            background: var(--ok);
            color: #062018;
            border-color: transparent;
        }
        .radio-btn.error {
            background: rgba(255, 107, 107, .15);
            color: var(--err);
            border-color: rgba(255, 107, 107, .4);
        }

        .placeholder {
            color: var(--muted);
            font-size: 14px;
            padding: 4px 0;
        }
    </style>
</head>
<body>

<div class="tv">
    <h1>Programme <span>TV</span></h1>

    <!-- RADIO -->
    <div class="section">
        <h2>📻 Radios</h2>

        <div class="radio-row">
