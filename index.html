<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programme TV — Chaînes, actus séries & films</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap');
  :root{ --screen: #101418; --panel: #171d24; --panel-edge: #232b34; --scan: #1c232b; --tube: #ff5f3c; --text: #e8ecef; --muted: #7c8792; --ok: #4fd1a5; }
  *{ box-sizing: border-box; }
  body{ margin:0; padding:32px 16px; background: var(--screen); color: var(--text); font-family: 'Space Grotesk', sans-serif; display:flex; justify-content:center; }
  .tv{ width:100%; max-width: 760px; background: #141a1f; border-radius: 28px; padding: 20px; }
  .section{ margin-top: 30px; border-top: 1px solid var(--panel-edge); padding-top: 20px; }
  .radio-item{ display:flex; justify-content:space-between; align-items:center; padding: 10px 0; }
  .radio-btn{ background: rgba(255,95,60,.1); border: 1px solid rgba(255,95,60,.35); color: var(--tube); padding: 8px 15px; border-radius: 8px; cursor:pointer; font-weight:700; }
  .radio-btn.playing{ background: var(--ok); color:#062018; border-color:transparent; }
  .card{ background: var(--scan); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
</style>
</head>
<body>

  <div class="tv">
    <h1>Programme <span>TV</span></h1>

    <!-- SECTION RADIO -->
    <div class="section">
      <h2>📻 Radios</h2>
      <div class="radio-item">
        <span>France Info</span>
        <button class="radio-btn" data-src="https://stream.radiofrance.fr/franceinfo/franceinfo_hifi.mp3">▶ Écouter</button>
      </div>
    </div>

    <!-- SECTION IA -->
    <div class="section">
      <h2>🧠 Actus IA</h2>
      <div id="aiNewsCards"></div>
    </div>
  </div>

  <audio id="musicAudio"></audio>

<script>
  // Logique Radio Fiabilisée
  document.querySelectorAll('.radio-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const audio = document.getElementById('musicAudio');
      const src = btn.getAttribute('data-src');
      if (audio.src === src && !audio.paused) {
        audio.pause();
        btn.classList.remove('playing'); btn.innerText = "▶ Écouter";
      } else {
        audio.src = src; audio.play().catch(e => console.error("Lecture bloquée par le navigateur"));
        document.querySelectorAll('.radio-btn').forEach(b => { b.classList.remove('playing'); b.innerText = "▶ Écouter"; });
        btn.classList.add('playing'); btn.innerText = "■ Arrêter";
      }
    });
  });

  // Logique IA
  async function loadAIData() {
    try {
      const res = await fetch('data/news-ai.json');
      const data = await res.json();
      document.getElementById('aiNewsCards').innerHTML = data.items.map(i => `<div class="card">${i.title}</div>`).join('');
    } catch (e) { console.error("Erreur chargement JSON"); }
  }
  document.addEventListener('DOMContentLoaded', loadAIData);
</script>
</body>
</html>
