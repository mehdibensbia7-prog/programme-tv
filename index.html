<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programme TV — Chaînes, actus séries & films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --screen: #101418; --panel: #171d24; --panel-edge: #232b34; --scan: #1c232b;
    --tube: #ff5f3c; --text: #e8ecef; --muted: #97a0aa; --ok: #4fd1a5; --warn: #e8b64f; --err: #ff6b6b;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100vh;
    background: radial-gradient(ellipse at 50% -10%, #1a2129 0%, var(--screen) 55%);
    color: var(--text); font-family: 'Space Grotesk', sans-serif; line-height: 1.55;
    display:flex; align-items:flex-start; justify-content:center;
    padding: 32px 16px;
  }
  .tv{ width:100%; max-width: 780px; background: linear-gradient(180deg,#20272e,#141a1f);
    border-radius: 28px; padding: 10px; box-shadow: 0 40px 80px -30px rgba(0,0,0,.7), inset 0 0 0 1px #2c343d; }
  .tv-inner{ background: var(--panel); border-radius: 20px; padding: 38px 28px 32px; position: relative; overflow:hidden; }
  .tv-inner::before{ content:""; position:absolute; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px); pointer-events:none; }

  .eyebrow{ font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--tube); font-weight: 700; margin: 0 0 10px; display:flex; align-items:center; gap:8px; }
  .eyebrow::before{ content:""; width:7px; height:7px; border-radius:50%; background: var(--tube); box-shadow: 0 0 8px 2px var(--tube); }
  h1{ font-family: 'Bebas Neue', sans-serif; font-size: 46px; letter-spacing: .03em; margin: 0 0 10px; line-height: 1; color: #fff; }
  h1 span{ color: var(--tube); }
  .sub{ color: var(--muted); font-size: 15px; margin: 0 0 24px; max-width: 58ch; line-height: 1.6; }

  .status{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    font-size: 13px; color: var(--muted); background: var(--scan); border: 1px solid var(--panel-edge);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 26px; }
  .status .dot{ display:inline-block; width:7px; height:7px; border-radius:50%; background: var(--ok); box-shadow: 0 0 6px 1px var(--ok); margin-right:6px; }

  form{ display:flex; gap:10px; margin-bottom: 28px; }
  input[type="text"]{ flex:1; background: var(--scan); border: 1px solid var(--panel-edge); border-radius: 12px;
    padding: 15px 16px; color: var(--text); font-family: inherit; font-size: 16px; outline: none;
    transition: border-color .15s, box-shadow .15s; }
  input[type="text"]::placeholder{ color: #5a636c; }
  input[type="text"]:focus{ border-color: var(--tube); box-shadow: 0 0 0 3px rgba(255,95,60,.15); }
  button.submit{ background: var(--tube); color: #1a0f0a; border: none; border-radius: 12px; padding: 0 22px;
    font-family: inherit; font-weight: 700; font-size: 15px; cursor: pointer; white-space: nowrap; }
  button.submit:hover{ background: #ff7a58; }

  .result{ margin-top: -12px; margin-bottom: 24px; padding: 16px 18px; border-radius: 12px; background: var(--scan);
    border: 1px solid var(--panel-edge); display:none; align-items:center; justify-content:space-between; gap: 12px; flex-wrap: wrap; }
  .result.show{ display:flex; }
  .result-text{ font-size: 14px; color: var(--muted); }
  .result-text b{ color: var(--text); }
  .result a.go{ color: var(--ok); font-weight: 700; text-decoration:none; font-size: 14px;
    border: 1px solid rgba(79,209,165,.35); padding: 8px 14px; border-radius: 9px; }
  .result a.go:hover{ background: rgba(79,209,165,.1); }

  .section{ margin-top: 38px; border-top: 1px solid var(--panel-edge); padding-top: 28px; }
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom: 8px; flex-wrap: wrap; }
  .section-head h2{ font-family:'Bebas Neue', sans-serif; font-size: 25px; letter-spacing:.02em; margin:0; color:#fff; font-weight:400; }
  .section-head .mini-status{ font-size: 12px; color: var(--muted); }
  .section-sub{ font-size: 13.5px; color: var(--muted); margin: 0 0 18px; line-height: 1.6; }

  .radio-section{ background: var(--scan); border: 1px solid var(--panel-edge); border-radius: 14px; padding: 8px 18px; }
  .radio-item{ display:flex; align-items:center; justify-content:space-between; padding: 14px 0; border-bottom: 1px solid var(--panel-edge); }
  .radio-item:last-child{ border-bottom: none; }
  .radio-name{ font-weight:600; font-size: 15px; color: var(--text); }
  .radio-btn{ background: rgba(255,95,60,.1); border: 1px solid rgba(255,95,60,.35); color: var(--tube);
    padding: 8px 16px; border-radius: 8px; font-weight:700; cursor:pointer; font-size: 13px; font-family: inherit; }
  .radio-btn.playing{ background: var(--ok); border-color: transparent; color:#062018; }
  
  .cards{ display:flex; flex-direction:column; gap:12px; }
  .card{ background: var(--scan); border: 1px solid var(--panel-edge); border-radius: 14px; padding: 16px 18px; display:flex; gap:14px; align-items:flex-start; }
  .card img{ width: 72px; height: 72px; object-fit: cover; border-radius: 10px; flex-shrink:0; background:#000; }
  .card-body{ min-width: 0; }
  .card a.card-title{ color: var(--text); font-weight: 700; font-size: 15px; text-decoration:none; line-height:1.4; display:block; margin-bottom:6px; }
  .card p{ font-size: 13.5px; line-height: 1.55; margin: 0; color: var(--muted); }
  .placeholder{ color: var(--muted); font-size: 14px; padding: 6px 2px; }
</style>
</head>
<body>

<div class="tv">
  <div class="tv-inner">
    <h1>Programme<span>TV</span></h1>
    <form id="searchForm">
      <input type="text" id="channelInput" placeholder="ex : Canal+, TF1…" autocomplete="off">
      <button class="submit" type="submit">Chercher</button>
    </form>

    <div class="section">
      <div class="section-head"><h2>📻 Radios</h2></div>
      <div class="radio-section">
        <div class="radio-item"><span class="radio-name">France Info</span><button class="radio-btn" data-src="https://icecast.radiofrance.fr/franceinfo-midfi.mp3">▶ Écouter</button></div>
        <div class="radio-item"><span class="radio-name">France Culture</span><button class="radio-btn" data-src="https://icecast.radiofrance.fr/franceculture-midfi.mp3">▶ Écouter</button></div>
        <div class="radio-item"><span class="radio-name">FIP</span><button class="radio-btn" data-src="https://icecast.radiofrance.fr/fip-midfi.mp3">▶ Écouter</button></div>
      </div>
    </div>

    <div class="section">
      <div class="section-head"><h2>🎬 Tendances</h2></div>
      <div class="cards" id="trendsCards"><p class="placeholder">Chargement…</p></div>
    </div>
  </div>
</div>

<audio id="musicAudio"></audio>

<script>
  // Gestion Radio
  document.querySelectorAll('.radio-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const audio = document.getElementById('musicAudio');
      const src = btn.getAttribute('data-src');
      
      if (!audio.paused && audio.src === src) {
        audio.pause();
        btn.textContent = "▶ Écouter";
        btn.classList.remove('playing');
      } else {
        audio.src = src;
        audio.play().catch(e => console.error("Lecture bloquée :", e));
        document.querySelectorAll('.radio-btn').forEach(b => {
          b.textContent = "▶ Écouter";
          b.classList.remove('playing');
        });
        btn.textContent = "⏸ Arrêter";
        btn.classList.add('playing');
      }
    });
  });

  // Recherche
  document.getElementById("searchForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const raw = document.getElementById("channelInput").value.trim();
    if (raw) window.open("https://tv-programme.com/" + raw.toLowerCase().replace(/\s+/g, "-"), "_blank");
  });

  // Chargement Data
  async function loadData(file, cardsId) {
    try {
      const res = await fetch(`./data/${file}`, { cache: "no-store" });
      const data = await res.json();
      document.getElementById(cardsId).innerHTML = data.items.map(item => `
        <div class="card">
          ${item.image ? `<img src="${item.image}" alt="">` : ''}
          <div class="card-body">
            <a class="card-title" href="${item.link}" target="_blank">${item.title}</a>
            <p>Saison : ${item.season || 'N/A'} | Sortie : ${item.date || 'N/A'}</p>
          </div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById(cardsId).innerHTML = "<p class='placeholder'>Données en attente…</p>";
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadData('trends-ai.json', 'trendsCards');
  });
</script>

</body>
</html>
