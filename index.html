<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme TV & Actus IA</title>
    <style>
        :root { --screen: #101418; --panel: #171d24; --panel-edge: #232b34; --scan: #1c232b; --tube: #ff5f3c; --text: #e8ecef; --muted: #7c8792; }
        body { background: var(--screen); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 760px; }
        .section { margin-bottom: 30px; border-bottom: 1px solid var(--panel-edge); padding-bottom: 20px; }
        h2 { font-family: sans-serif; font-size: 20px; color: #fff; margin-bottom: 15px; }
        .card { background: var(--scan); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--panel-edge); }
        .card-title { font-weight: bold; color: var(--tube); display: block; margin-bottom: 5px; text-decoration: none; }
        .card-desc { font-size: 14px; color: var(--text); line-height: 1.4; }
        .loading { color: var(--muted); font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Section Actus -->
    <div class="section">
        <h2>🧠 ACTUS CINÉ (IA)</h2>
        <div id="newsContent" class="loading">Chargement des actus...</div>
    </div>

    <!-- Section Tendances -->
    <div class="section">
        <h2>🎬 TENDANCES DU MOMENT</h2>
        <div id="trendsContent" class="loading">Chargement des tendances...</div>
    </div>
</div>

<script>
    // Fonction unique pour charger chaque fichier JSON depuis le dossier /data
    async function loadData(filename, containerId) {
        const container = document.getElementById(containerId);
        try {
            // On pointe bien vers le dossier /data/
            const response = await fetch(`data/${filename}`, { cache: "no-store" });
            if (!response.ok) throw new Error("Erreur");
            
            const data = await response.json();
            
            if (!data.items || data.items.length === 0) {
                container.innerHTML = "Aucune donnée disponible.";
                return;
            }

            container.innerHTML = data.items.map(item => `
                <div class="card">
                    <a class="card-title" href="${item.link || '#'}">${item.title}</a>
                    <div class="card-desc">${item.desc || ''}</div>
                </div>
            `).join('');

        } catch (e) {
            container.innerHTML = "Données indisponibles pour le moment.";
        }
    }

    // Chargement automatique au démarrage
    document.addEventListener('DOMContentLoaded', () => {
        loadData('news-ai.json', 'newsContent');
        loadData('trends-ai.json', 'trendsContent');
    });
</script>

</body>
</html>
