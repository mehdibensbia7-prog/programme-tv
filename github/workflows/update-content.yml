    - cron: '0 */6 * * *'   # toutes les 6 heures
  workflow_dispatch:         # bouton "Run workflow" manuel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
