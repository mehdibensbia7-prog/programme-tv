name: Site Health Check

on:
  schedule:
    # Toutes les 6h, décalé d'1h après "Update AI Content" (0h/6h/12h/18h UTC)
    # pour contrôler l'état du site juste après chaque mise à jour de contenu.
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Contrôle qualité + auto-réparation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/health-check.mjs

      - name: Commit & Push du rapport
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/health-report.json data/health-report.md data/ -f
          git diff --quiet && git diff --staged --quiet || git commit -m "🩺 Health check automatique"
          git push
